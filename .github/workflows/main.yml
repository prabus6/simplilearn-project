name: OpenTofu-Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - master
      confirm:
        description: "Type 'yes' to confirm deployment"
        required: true
        default: "no"

# Permissions

permissions:
  id-token: write  
  contents: read
  security-events: write 

env:
  TF_WORKING_DIR: terraform-code
  TOFU_VERSION: "1.12.0"

###############################################################################
# Job 1 – Confirm
# Fails fast if confirm input is not 'yes'.
# Resolves:
#   - which branch to checkout (dev → dev, test → test, master → master)
#   - which GitHub Environment to target (dev → dev, test → test, master → production)

jobs:
  confirm:
    name: Approve Deployment
    runs-on: ubuntu-latest

    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
      github_environment: ${{ steps.resolve.outputs.github_environment }}
      tf_environment: ${{ steps.resolve.outputs.tf_environment }}

    steps:
      - name: Check User Input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "::error::Deployment aborted — confirm input must be 'yes'. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi

      - name: Resolve Branch and Environment
        id: resolve
        run: |
          INPUT="${{ github.event.inputs.environment }}"

          if [ "$INPUT" = "dev" ]; then
            echo "branch=dev"                >> "$GITHUB_OUTPUT"
            echo "github_environment=dev"    >> "$GITHUB_OUTPUT"
            echo "tf_environment=dev"        >> "$GITHUB_OUTPUT"

          elif [ "$INPUT" = "test" ]; then
            echo "branch=test"               >> "$GITHUB_OUTPUT"
            echo "github_environment=test"   >> "$GITHUB_OUTPUT"
            echo "tf_environment=test"       >> "$GITHUB_OUTPUT"

          elif [ "$INPUT" = "master" ]; then
            echo "branch=master"                  >> "$GITHUB_OUTPUT"
            echo "github_environment=production"  >> "$GITHUB_OUTPUT"
            echo "tf_environment=prod"            >> "$GITHUB_OUTPUT"

          else
            echo "::error::Unknown environment input: $INPUT"
            exit 1
          fi

      - name: Print Deployment Plan
        run: |
          echo "Confirmed"
          echo "Selected option  : ${{ github.event.inputs.environment }}"
          echo "Branch to deploy : ${{ steps.resolve.outputs.branch }}"
          echo "GitHub Env       : ${{ steps.resolve.outputs.github_environment }}"
          echo "TF environment   : ${{ steps.resolve.outputs.tf_environment }}"


# Job 2 – Lint and Validate

  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest
    needs: confirm
    continue-on-error: true 

    steps:
      - name: Checkout Branch - ${{ needs.confirm.outputs.branch }}
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.confirm.outputs.branch }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Check Formatting
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tofu fmt -check -recursive
          if [ $? -ne 0 ]; then
            echo "::error::Terraform files are not formatted. Run 'tofu fmt -recursive' locally."
            #exit 1
          fi

      - name: Validate Configuration
        working-directory: ${{ env.TF_WORKING_DIR }}
        # -backend=false skips remote state auth — no credentials needed here
        run: |
          tofu init -backend=false -input=false
          tofu validate -no-color


# Job 3 – Trivy IaC Security Scan

  trivy-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout Branch - ${{ needs.confirm.outputs.branch }}
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.confirm.outputs.branch }}

      - name: Run Trivy IaC Scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: "config"
          scan-ref: ${{ env.TF_WORKING_DIR }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          ignore-unfixed: true

      - name: Print Trivy Results to Build Log
        if: always()
        run: |
          if [ -f trivy-results.table ]; then
            echo "================================================================"
            echo " Trivy IaC Scan Results - ${{ github.event.inputs.environment }}"
            echo "================================================================"
            cat trivy-results.table
            echo "================================================================"
          fi

# Job 4 – Plan

  plan:
    name: Plan - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: [confirm, trivy-scan]

    environment:
      name: ${{ needs.confirm.outputs.github_environment }}

    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    env:      
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_environment: ${{ needs.confirm.outputs.tf_environment }}
      
    steps:
      - name: Checkout Branch - ${{ needs.confirm.outputs.branch }}
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.confirm.outputs.branch }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tofu init \
            -input=false \
            -backend-config="key=${{ needs.confirm.outputs.tf_environment }}/containerapp.tfstate"

      - name: OpenTofu Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          tofu plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -var="environment=${{ needs.confirm.outputs.tf_environment }}" \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Print Plan Summary
        run: |
          echo "### OpenTofu Plan" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ needs.confirm.outputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Environment | ${{ needs.confirm.outputs.github_environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TF Environment | ${{ needs.confirm.outputs.tf_environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Subscription | ${{ secrets.AZURE_SUBSCRIPTION_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 ${{ env.TF_WORKING_DIR }}/plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail on Plan Error
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::tofu plan failed."
          exit 1


# Job 5 – Apply

  apply:
    name: Apply - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: [confirm, plan]
    if: needs.plan.outputs.plan_exit_code == '2'

    environment:
      name: ${{ needs.confirm.outputs.github_environment }}

    env:      
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_environment: ${{ needs.confirm.outputs.tf_environment }}

    steps:
      - name: Checkout Branch - ${{ needs.confirm.outputs.branch }}
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.confirm.outputs.branch }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tofu init \
            -input=false \
            -backend-config="key=${{ needs.confirm.outputs.tf_environment }}/containerapp.tfstate"

      - name: OpenTofu Plan (pre-apply)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tofu plan \
            -input=false \
            -no-color \
            -var="environment=${{ needs.confirm.outputs.tf_environment }}" \
            -out=tfplan

      - name: OpenTofu Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tofu apply \
            -input=false \
            -no-color \
            tfplan

      - name: Post Apply Summary
        if: always()
        run: |
          echo "### OpenTofu Apply" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ needs.confirm.outputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Environment | ${{ needs.confirm.outputs.github_environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TF Environment | ${{ needs.confirm.outputs.tf_environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Subscription | ${{ secrets.AZURE_SUBSCRIPTION_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
