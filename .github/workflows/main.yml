###############################################################################
# .github/workflows/terraform.yml
#
# OpenTofu – Manual Parameterized Multi-Subscription Deployment Pipeline
#
# Flow:
#   workflow_dispatch → confirm → lint & validate → trivy scan → plan → apply
#
# Each environment maps to its own Azure subscription via GitHub Environment
# scoped secrets. Secrets set at global level are NOT used for credentials —
# all Azure auth is resolved per-environment inside each job.
#
# GitHub Environment setup (Settings → Environments):
#
#   Environment: dev
#     Secrets: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
#              AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#              TF_VAR_COST_CENTER
#
#   Environment: test
#     Secrets: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
#              AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#              TF_VAR_COST_CENTER
#
#   Environment: production
#     Secrets: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
#              AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#              TF_VAR_COST_CENTER
#     Protection: Required reviewers enabled
###############################################################################

name: OpenTofu-Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - master
      confirm:
        description: "Type 'yes' to confirm deployment"
        required: true
        default: "no"


# Permissions

permissions:
  id-token: write        # SPN auth
  contents: read
  security-events: write # upload Trivy SARIF (report) to GitHub Security tab


# Non-sensitive global defaults only — NO credentials here.
# Credentials are environment-scoped and injected per job below.

env:
  TF_WORKING_DIR: terraform-code
  TOFU_VERSION: "1.11.8"


# Job 1 – Approval Stage

jobs:
  confirm:
    name: Approve Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Check User Input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "::error::Deployment aborted — confirm input must be 'yes'. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "Approved. Deploying to: ${{ github.event.inputs.environment }}"


# Job 2 – Lint & Validate
# No Azure credentials needed — purely static analysis.

  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest
    needs: confirm
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v6
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Check Formatting
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tofu fmt -check -recursive
          if [ $? -ne 0 ]; then
            echo "::error::Terraform files are not formatted. Run 'tofu fmt -recursive' locally."
            exit 1
          fi

      - name: Validate Configuration
        working-directory: ${{ env.TF_WORKING_DIR }}
        # tofu validate needs init — use -backend=false to skip remote state auth
        run: |
          tofu init -backend=false -input=false
          tofu validate -no-color


# Job 3 – Trivy IaC Security Scan
# Ref - https://github.com/aquasecurity/trivy-action/blob/master/README.md

  trivy-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
   # needs: lint-and-validate
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}


    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy IaC Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: ${{ env.TF_WORKING_DIR }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-iac"

      - name: Upload Trivy Results as Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trivy-results-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: trivy-results.sarif
          retention-days: 30


# Job 4 – Plan
# Declares the GitHub Environment so environment-scoped secrets are available.
# This means the correct subscription credentials are used automatically
# based on which environment was selected in the workflow_dispatch input.

  plan:
    name: Plan – ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: trivy-scan
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    # Declaring environment here unlocks the scoped secrets for this job.
    # dev   → reads dev secrets   → deploys to dev subscription
    # test  → reads test secrets  → deploys to test subscription
    # prod  → reads prod secrets  → deploys to prod subscription
    environment:
      name: ${{ github.event.inputs.environment }}

    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    env:
      # Credentials injected from the selected GitHub Environment's secrets
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # Terraform variables
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_cost_center: ${{ secrets.TF_VAR_COST_CENTER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu init -input=false

      - name: OpenTofu Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          tofu plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -var="environment=${{ github.event.inputs.environment }}" \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v6
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 5

      - name: Print Plan Summary
        run: |
          echo "### OpenTofu Plan – ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "| Subscription | ${{ secrets.AZURE_SUBSCRIPTION_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 ${{ env.TF_WORKING_DIR }}/plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail on Plan Error
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::tofu plan failed."
          exit 1


# Job 5 – Apply
# Also declares the same GitHub Environment — same scoped secrets apply.
# For production, the environment's required reviewers gate kicks in here,
# pausing the job until an approved reviewer clicks Approve in GitHub UI.

  apply:
    name: Apply – ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.plan_exit_code == '2'

    environment:
      name: ${{ github.event.inputs.environment }}
      url: https://portal.azure.com

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_cost_center: ${{ secrets.TF_VAR_COST_CENTER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: OpenTofu Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu init -input=false

      - name: Download Plan Artifact
        uses: actions/download-artifact@v6
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: OpenTofu Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tofu apply \
            -input=false \
            -no-color \
            tfplan

      - name: Post Apply Summary
        if: always()
        run: |
          echo "### OpenTofu Apply – ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Subscription | ${{ secrets.AZURE_SUBSCRIPTION_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
